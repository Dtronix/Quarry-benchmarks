<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quarry Benchmarks Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
  <script src="data.js"></script>
  <style>
    :root {
      --bg: #f5f5f5;
      --text: #24292e;
      --text-muted: #586069;
      --card-bg: #ffffff;
      --border: #e1e4e8;
      --input-border: #d1d5da;
      --link: #0366d6;
      --shadow: rgba(0,0,0,0.08);
      --chart-line: #0366d6;
      --chart-fill: rgba(3,102,214,0.1);
      --chart-band: rgba(3,102,214,0.18);
      --chart-grid: rgba(0,0,0,0.08);
      --chart-memory-line: #d1741f;
      --chart-memory-point: #d1741f;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --text: #e6edf3;
        --text-muted: #8b949e;
        --card-bg: #161b22;
        --border: #30363d;
        --input-border: #30363d;
        --link: #58a6ff;
        --shadow: rgba(0,0,0,0.5);
        --chart-line: #58a6ff;
        --chart-fill: rgba(88,166,255,0.15);
        --chart-band: rgba(88,166,255,0.22);
        --chart-grid: rgba(255,255,255,0.08);
        --chart-memory-line: #f0883e;
        --chart-memory-point: #f0883e;
      }
    }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; color: var(--text); background: var(--bg); }
    header { background: var(--card-bg); padding: 1.25rem 2rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 10; }
    header h1 { margin: 0; font-size: 1.4rem; }
    header .meta { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.4rem; }
    header nav { margin-top: 0.6rem; }
    header nav a { color: var(--link); text-decoration: none; margin-right: 1.25rem; font-size: 0.9rem; }
    header nav a:hover { text-decoration: underline; }
    .toolbar { padding: 1rem 2rem; background: var(--card-bg); border-bottom: 1px solid var(--border); display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
    .toolbar input[type="search"] { padding: 0.5rem 0.75rem; border: 1px solid var(--input-border); border-radius: 4px; font-size: 0.9rem; width: 320px; max-width: 100%; background: var(--bg); color: var(--text); }
    .toolbar label { font-size: 0.85rem; color: var(--text-muted); display: inline-flex; align-items: center; gap: 0.4rem; cursor: pointer; }
    main { padding: 1.5rem 2rem; }
    .charts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(840px, 1fr)); gap: 1.25rem; }
    .chart { background: var(--card-bg); padding: 1.25rem 1.5rem; border-radius: 6px; box-shadow: 0 1px 3px var(--shadow); }
    .chart h3 { margin: 0 0 0.25rem; font-family: monospace; font-size: 1rem; color: var(--text); word-break: break-all; }
    .chart .unit-label { color: var(--text-muted); font-size: 0.8rem; margin-bottom: 0.5rem; font-family: monospace; }
    .chart .unit-label .mem-label { color: var(--chart-memory-line); }
    .chart canvas { max-height: 440px !important; }
    .empty { padding: 4rem 2rem; text-align: center; color: var(--text-muted); background: var(--card-bg); border-radius: 6px; }
    .count { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <header>
    <h1>Quarry Benchmarks Dashboard</h1>
    <div class="meta" id="meta"></div>
    <nav>
      <a href="../../">Home</a>
      <a href="runs/">Run History</a>
      <a href="https://github.com/Dtronix/Quarry">Source</a>
    </nav>
  </header>
  <div class="toolbar">
    <input type="search" id="filter" placeholder="Filter benchmarks by name...">
    <label><input type="checkbox" id="toggle-mem" checked> Show memory</label>
  </div>
  <main>
    <div class="count" id="count"></div>
    <div class="charts-grid" id="charts"></div>
  </main>
  <script>
    const data = window.BENCHMARK_DATA || { entries: {} };
    const meta = document.getElementById('meta');
    if (data.lastUpdate) {
      meta.textContent = 'Last updated: ' + new Date(data.lastUpdate).toLocaleString();
    }

    function readThemeColors() {
      const styles = getComputedStyle(document.documentElement);
      return {
        text: styles.getPropertyValue('--text').trim() || '#24292e',
        textMuted: styles.getPropertyValue('--text-muted').trim() || '#586069',
        line: styles.getPropertyValue('--chart-line').trim() || '#0366d6',
        fill: styles.getPropertyValue('--chart-fill').trim() || 'rgba(3,102,214,0.1)',
        band: styles.getPropertyValue('--chart-band').trim() || 'rgba(3,102,214,0.18)',
        grid: styles.getPropertyValue('--chart-grid').trim() || 'rgba(0,0,0,0.08)',
        memLine: styles.getPropertyValue('--chart-memory-line').trim() || '#d1741f',
        memPoint: styles.getPropertyValue('--chart-memory-point').trim() || '#d1741f'
      };
    }

    function applyChartDefaults() {
      const c = readThemeColors();
      Chart.defaults.color = c.textMuted;
      Chart.defaults.borderColor = c.grid;
      return c;
    }
    let themeColors = applyChartDefaults();

    // Mirrors `Reporter.AnchorFor`: letters/digits lowercased, everything
    // else → '-'. Used to build section-anchored run links from FQNs like
    // "Quarry.Benchmarks.Benchmarks.ComplexMultiJoinAggregateBenchmarks.Quarry_Three".
    function anchorFor(s) {
      let out = '';
      for (const c of s) out += /[a-zA-Z0-9]/.test(c) ? c.toLowerCase() : '-';
      return out;
    }
    function deriveSectionAnchor(fqn) {
      const parts = (fqn || '').split('.');
      if (parts.length < 2) return '';
      return anchorFor(parts[parts.length - 2]);
    }

    const benchmarkPoints = {};
    for (const [, runs] of Object.entries(data.entries || {})) {
      for (const run of runs) {
        const ts = run.commit && run.commit.timestamp ? new Date(run.commit.timestamp).getTime() : run.date;
        const date = new Date(ts);
        const datePrefix = date.toISOString().slice(0, 10);
        const shortSha = (run.commit && run.commit.id ? run.commit.id : '').slice(0, 8);
        const message = run.commit && run.commit.message ? run.commit.message : '';
        for (const bench of run.benches || []) {
          if (!benchmarkPoints[bench.name]) benchmarkPoints[bench.name] = [];
          // `range` from github-action-benchmark looks like "± 12.34" — strip
          // the prefix and parse the magnitude. Falls back to 0 when absent.
          const rangeNum = parseFloat((bench.range || '').replace(/[^0-9.\-eE]/g, '')) || 0;
          benchmarkPoints[bench.name].push({
            ts: ts,
            y: bench.value,
            range: rangeNum,
            // `allocated` (bytes) is injected by the workflow's patch step.
            // Missing for pre-backfill runs — chart tolerates null.
            alloc: typeof bench.allocated === 'number' ? bench.allocated : null,
            sha: shortSha,
            datePrefix: datePrefix,
            message: message,
            unit: bench.unit || 'ns'
          });
        }
      }
    }

    // ─────────────────────────────────────────────────────────────────────
    // Unit selection per series — ns/us/ms/s for time, B/KB/MB/GB for bytes.
    // Each series picks its own best-fit unit from its median value, so the
    // left and right axes scale independently.
    // ─────────────────────────────────────────────────────────────────────
    const TIME_UNITS = [
      { unit: 'ns', factor: 1,   threshold: 1e3,      relative: '10\u207B\u2079 s' },
      { unit: 'us', factor: 1e3, threshold: 1e6,      relative: '10\u207B\u2076 s' },
      { unit: 'ms', factor: 1e6, threshold: 1e9,      relative: '10\u207B\u00B3 s' },
      { unit: 's',  factor: 1e9, threshold: Infinity, relative: '10\u2070 s' }
    ];
    const BYTE_UNITS = [
      { unit: 'B',  factor: 1,                 threshold: 1024 },
      { unit: 'KB', factor: 1024,              threshold: 1024 * 1024 },
      { unit: 'MB', factor: 1024 * 1024,       threshold: 1024 * 1024 * 1024 },
      { unit: 'GB', factor: 1024 * 1024 * 1024, threshold: Infinity }
    ];

    function pickUnitFrom(values, table) {
      if (values.length === 0) return table[0];
      const sorted = values.slice().sort((a, b) => a - b);
      const median = sorted[Math.floor(sorted.length / 2)];
      for (const u of table) if (median < u.threshold) return u;
      return table[table.length - 1];
    }

    function formatValue(v) {
      // Adaptive precision — 3 sig figs is plenty once the unit is right-sized.
      if (v >= 1000) return v.toFixed(0);
      if (v >= 100)  return v.toFixed(1);
      if (v >= 10)   return v.toFixed(2);
      return v.toFixed(3);
    }

    function buildTimeDatasets(points, colors, unit) {
      // x = commit index (equal-width slots); `ts` stays on each point for
      // tooltip/click routing. yNs/rangeNs preserve raw ns for theme rebuilds.
      const f = unit.factor;
      const scaled = points.map((p, i) => ({
        x: i,
        y: p.y / f,
        range: p.range / f,
        yNs: p.y,
        rangeNs: p.range,
        ts: p.ts,
        sha: p.sha,
        datePrefix: p.datePrefix,
        message: p.message,
        unit: unit.unit
      }));
      const lower = scaled.map(p => ({ x: p.x, y: p.y - p.range }));
      const upper = scaled.map(p => ({ x: p.x, y: p.y + p.range }));

      // Adaptive marker visibility: hide circles on dense series. Markers
      // become noise (and slow) past ~100 points; hover still surfaces them.
      const dense = scaled.length > 100;
      const meanPointRadius = dense ? 0 : 4;
      const meanPointHitRadius = dense ? 12 : 4;

      return [
        {
          // Lower bound — invisible line, fill anchor only.
          label: '_lower',
          data: lower,
          borderColor: 'transparent',
          backgroundColor: 'transparent',
          pointRadius: 0,
          pointHoverRadius: 0,
          fill: false,
          tension: 0,
          spanGaps: true,
          parsing: false,
          yAxisID: 'y'
        },
        {
          // Upper bound — fills down to the previous dataset → the band.
          label: '_upper',
          data: upper,
          borderColor: 'transparent',
          backgroundColor: colors.band,
          pointRadius: 0,
          pointHoverRadius: 0,
          fill: '-1',
          tension: 0,
          spanGaps: true,
          parsing: false,
          yAxisID: 'y'
        },
        {
          // Mean line, drawn last → on top of the band.
          label: 'Mean',
          data: scaled,
          borderColor: colors.line,
          backgroundColor: colors.fill,
          pointBackgroundColor: colors.line,
          tension: 0,
          spanGaps: true,
          pointRadius: meanPointRadius,
          pointHitRadius: meanPointHitRadius,
          pointHoverRadius: 7,
          pointHoverBorderWidth: 2,
          fill: false,
          yAxisID: 'y'
        }
      ];
    }

    function buildAllocDataset(points, colors, unit) {
      if (!unit) return null;
      const f = unit.factor;
      // Preserve full-array index so a gap (null alloc) renders as a break,
      // not a false connection to the next available point.
      const scaled = points
        .map((p, i) => ({ point: p, index: i }))
        .filter(e => e.point.alloc != null)
        .map(e => ({
          x: e.index,
          y: e.point.alloc / f,
          yBytes: e.point.alloc,
          ts: e.point.ts,
          sha: e.point.sha,
          datePrefix: e.point.datePrefix,
          message: e.point.message,
          unit: unit.unit
        }));
      if (scaled.length === 0) return null;
      const dense = scaled.length > 100;
      return {
        label: 'Allocated',
        data: scaled,
        borderColor: colors.memLine,
        backgroundColor: 'transparent',
        borderDash: [6, 4],
        pointBackgroundColor: colors.memPoint,
        tension: 0,
        spanGaps: true,
        pointRadius: dense ? 0 : 3,
        pointHitRadius: dense ? 12 : 4,
        pointHoverRadius: 6,
        fill: false,
        yAxisID: 'y1'
      };
    }

    const chartsDiv = document.getElementById('charts');
    const countDiv = document.getElementById('count');
    const allNames = Object.keys(benchmarkPoints).sort();

    if (allNames.length === 0) {
      chartsDiv.innerHTML = '';
      document.querySelector('main').innerHTML = '<div class="empty">No benchmark data yet. The first run will populate this dashboard.</div>';
    } else {
      countDiv.textContent = allNames.length + ' benchmarks';
    }

    const charts = [];
    // Dataset labels that count as "navigate to run" when clicked.
    const NAV_LABELS = new Set(['Mean', 'Allocated']);

    for (const name of allNames) {
      const points = benchmarkPoints[name].sort((a, b) => a.ts - b.ts);
      const timeUnit = pickUnitFrom(points.map(p => p.y), TIME_UNITS);
      const allocValues = points.map(p => p.alloc).filter(v => v != null);
      const allocUnit = allocValues.length ? pickUnitFrom(allocValues, BYTE_UNITS) : null;
      const sectionAnchor = deriveSectionAnchor(name);

      const container = document.createElement('div');
      container.className = 'chart';
      container.dataset.name = name.toLowerCase();

      const unitLabelParts = [
        '<span>Time (' + timeUnit.unit + ') \u2014 ' + timeUnit.relative + '</span>'
      ];
      if (allocUnit) {
        unitLabelParts.push('<span class="mem-label">Memory (' + allocUnit.unit + ')</span>');
      }

      container.innerHTML =
        '<h3>' + name + '</h3>' +
        '<div class="unit-label">' + unitLabelParts.join(' &nbsp;\u00B7&nbsp; ') + '</div>' +
        '<canvas></canvas>';
      chartsDiv.appendChild(container);

      const datasets = buildTimeDatasets(points, themeColors, timeUnit);
      const allocDs = buildAllocDataset(points, themeColors, allocUnit);
      if (allocDs) datasets.push(allocDs);

      const xMax = Math.max(1, points.length - 1);
      const scales = {
        x: {
          // Commit-indexed axis — equal slot per run so gaps between runs
          // carry no visual weight. Ticks show short SHA at the commit index.
          type: 'linear',
          min: 0,
          max: xMax,
          offset: true,
          ticks: {
            precision: 0,
            maxTicksLimit: 12,
            autoSkip: true,
            callback: (v) => {
              const i = Math.round(v);
              return points[i] ? points[i].sha : '';
            }
          },
          grid: { display: false }
        },
        y: {
          position: 'left',
          beginAtZero: false,
          ticks: { callback: (v) => formatValue(v) },
          title: { display: true, text: 'Time (' + timeUnit.unit + ')', color: themeColors.line }
        }
      };
      if (allocUnit) {
        scales.y1 = {
          position: 'right',
          beginAtZero: false,
          // Second axis suppresses its own gridlines so they don't double up
          // with the left axis's.
          grid: { drawOnChartArea: false },
          ticks: { callback: (v) => formatValue(v) },
          title: { display: true, text: 'Memory (' + allocUnit.unit + ')', color: themeColors.memLine }
        };
      }

      const chart = new Chart(container.querySelector('canvas').getContext('2d'), {
        type: 'line',
        data: { datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          interaction: { mode: 'nearest', intersect: true },
          onClick: (evt, elements, chart) => {
            if (elements.length === 0) return;
            // Accept a hit on either the Mean or Allocated line — both
            // navigate to the same run report, anchored to this benchmark's
            // class section.
            const hit = elements.find(e => NAV_LABELS.has(chart.data.datasets[e.datasetIndex].label));
            if (!hit) return;
            const point = chart.data.datasets[hit.datasetIndex].data[hit.index];
            const url = 'runs/' + point.datePrefix + '-' + point.sha + '.html'
              + (sectionAnchor ? '#' + sectionAnchor : '');
            window.location.href = url;
          },
          onHover: (evt, elements) => {
            const navigable = elements.some(e => NAV_LABELS.has(chart.data.datasets[e.datasetIndex].label));
            evt.native.target.style.cursor = navigable ? 'pointer' : 'default';
          },
          scales,
          plugins: {
            legend: {
              display: true,
              // Hide internal band datasets from the legend.
              labels: { filter: (item) => !item.text.startsWith('_') }
            },
            tooltip: {
              filter: (ctx) => !ctx.dataset.label.startsWith('_'),
              callbacks: {
                title: (items) => {
                  const p = items[0].raw;
                  return (p.sha ? p.sha + ' \u2014 ' : '') + new Date(p.ts).toLocaleDateString();
                },
                label: (ctx) => {
                  const p = ctx.raw;
                  if (ctx.dataset.label === 'Mean') {
                    const main = 'Mean: ' + formatValue(p.y) + ' ' + p.unit
                      + (p.range ? '  \u00B1 ' + formatValue(p.range) + ' ' + p.unit : '');
                    return [main, p.message, '(click to open report)'];
                  }
                  if (ctx.dataset.label === 'Allocated') {
                    return ['Alloc: ' + formatValue(p.y) + ' ' + p.unit, '(click to open report)'];
                  }
                  return ctx.dataset.label + ': ' + formatValue(p.y);
                }
              }
            }
          }
        }
      });
      charts.push({ container, chart, timeUnit, allocUnit, points });
    }

    document.getElementById('filter').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase();
      let visible = 0;
      for (const { container } of charts) {
        const match = container.dataset.name.includes(term);
        container.style.display = match ? '' : 'none';
        if (match) visible++;
      }
      countDiv.textContent = visible + ' of ' + charts.length + ' benchmarks';
    });

    document.getElementById('toggle-mem').addEventListener('change', (e) => {
      const show = e.target.checked;
      for (const { chart } of charts) {
        const allocIdx = chart.data.datasets.findIndex(d => d.label === 'Allocated');
        if (allocIdx < 0) continue;
        chart.setDatasetVisibility(allocIdx, show);
        if (chart.options.scales.y1) chart.options.scales.y1.display = show;
        chart.update();
      }
    });

    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        themeColors = applyChartDefaults();
        for (const entry of charts) {
          const { chart, timeUnit, allocUnit, points } = entry;
          const datasets = buildTimeDatasets(points, themeColors, timeUnit);
          const allocDs = buildAllocDataset(points, themeColors, allocUnit);
          if (allocDs) datasets.push(allocDs);
          chart.data.datasets = datasets;
          if (chart.options.scales.y && chart.options.scales.y.title) {
            chart.options.scales.y.title.color = themeColors.line;
          }
          if (chart.options.scales.y1 && chart.options.scales.y1.title) {
            chart.options.scales.y1.title.color = themeColors.memLine;
          }
          chart.update();
        }
      });
    }
  </script>
</body>
</html>
